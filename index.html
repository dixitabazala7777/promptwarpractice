<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroFuel — Space Mission Fuel Efficiency Calculator</title>
  <meta name="description" content="Calculate space mission fuel requirements by distance and engine type. Supports Quantum Drive and Fusion Reactor engines." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .orbitron { font-family: 'Orbitron', monospace; }

    /* Animated starfield background */
    body {
      background: radial-gradient(ellipse at 20% 50%, #0d1b3e 0%, #020510 60%, #000 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Star particles */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 20%, rgba(200,220,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 45% 75%, rgba(200,220,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 45%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 85%, rgba(200,220,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 80% 25%, rgba(180,200,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 5%, rgba(255,255,255,0.7) 0%, transparent 100%);
      animation: twinkle 6s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.7; }
      50%  { opacity: 1; }
      100% { opacity: 0.5; }
    }

    /* Glassmorphism card */
    .glass-card {
      background: rgba(13, 27, 62, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 179, 237, 0.25);
      box-shadow: 0 8px 60px rgba(0, 100, 255, 0.15), 0 0 0 1px rgba(99,179,237,0.08) inset;
    }

    /* Neon input */
    .neon-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(99, 179, 237, 0.35);
      color: #e2e8f0;
      transition: all 0.3s ease;
    }
    .neon-input:focus {
      outline: none;
      border-color: #63b3ed;
      box-shadow: 0 0 0 3px rgba(99,179,237,0.15), 0 0 20px rgba(99,179,237,0.2);
      background: rgba(99,179,237,0.06);
    }
    .neon-input option { background: #0d1b3e; color: #e2e8f0; }

    /* Gradient button */
    .btn-launch {
      background: linear-gradient(135deg, #1a6cf0 0%, #7c3aed 100%);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-launch::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      transform: rotate(45deg) translateY(-100%);
      transition: transform 0.5s ease;
    }
    .btn-launch:hover::before { transform: rotate(45deg) translateY(0%); }
    .btn-launch:hover { box-shadow: 0 0 30px rgba(99,179,237,0.35), 0 0 60px rgba(124,58,237,0.2); transform: translateY(-2px); }
    .btn-launch:active { transform: translateY(0); }
    .btn-launch:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Result card animation */
    .result-panel {
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Pulse ring on result icon */
    .pulse-ring {
      animation: pulseRing 2s ease-out infinite;
    }
    @keyframes pulseRing {
      0%   { box-shadow: 0 0 0 0 rgba(99,179,237,0.5); }
      70%  { box-shadow: 0 0 0 14px rgba(99,179,237,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,179,237,0); }
    }

    /* Engine badge */
    .engine-badge {
      background: linear-gradient(135deg, rgba(99,179,237,0.12) 0%, rgba(124,58,237,0.12) 100%);
      border: 1px solid rgba(99,179,237,0.25);
    }

    /* Error shake */
    .shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 sm:p-6">

  <!-- Starfield -->
  <div class="stars" aria-hidden="true"></div>

  <!-- Main container -->
  <div class="relative z-10 w-full max-w-lg">

    <!-- Header -->
    <div class="text-center mb-8">
      <!-- Rocket icon -->
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4 pulse-ring"
           style="background: linear-gradient(135deg,#1a6cf0,#7c3aed);">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 2c0 0 4 4 4 9v1l2 2v2h-3l-1 2H10l-1-2H6v-2l2-2v-1c0-5 4-9 4-9z"/>
          <circle cx="12" cy="14" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <h1 class="orbitron text-3xl sm:text-4xl font-extrabold text-white tracking-widest uppercase">AstroFuel</h1>
      <p class="mt-2 text-blue-300 text-sm tracking-widest uppercase opacity-80">Space Mission Fuel Efficiency Calculator</p>
    </div>

    <!-- Card -->
    <div class="glass-card rounded-2xl p-6 sm:p-8">

      <!-- Distance input -->
      <div class="mb-5">
        <label for="distance" class="block text-xs font-medium uppercase tracking-widest text-blue-300 mb-2">
          Distance <span class="text-blue-400 opacity-60">(Light Years)</span>
        </label>
        <input
          id="distance"
          type="number"
          min="0"
          step="any"
          placeholder="e.g. 4.24"
          class="neon-input w-full rounded-xl px-4 py-3 text-base placeholder-blue-800"
          aria-label="Distance in Light Years"
        />
      </div>

      <!-- Engine type dropdown -->
      <div class="mb-6">
        <label for="engine" class="block text-xs font-medium uppercase tracking-widest text-blue-300 mb-2">
          Engine Type
        </label>
        <select
          id="engine"
          class="neon-input w-full rounded-xl px-4 py-3 text-base cursor-pointer"
          aria-label="Engine Type"
        >
          <option value="1.2">🔵 Quantum Drive — 1.2 tons / LY</option>
          <option value="3.5">🟠 Fusion Reactor — 3.5 tons / LY</option>
        </select>
      </div>

      <!-- Calculate button -->
      <button
        id="calcBtn"
        onclick="calculate()"
        class="btn-launch orbitron w-full py-3.5 rounded-xl text-white font-semibold tracking-widest text-sm uppercase"
        aria-label="Calculate fuel requirement"
      >
        🚀 Calculate Fuel
      </button>

      <!-- Error message -->
      <p id="errorMsg" class="hidden mt-3 text-red-400 text-sm text-center" role="alert" aria-live="polite"></p>

      <!-- Result panel -->
      <div id="result" class="hidden result-panel mt-6" role="region" aria-live="polite" aria-label="Fuel calculation result">
        <div class="engine-badge rounded-xl p-5 text-center">
          <p class="text-xs uppercase tracking-widest text-blue-400 mb-1" id="resultLabel">Total Fuel Required</p>
          <p class="orbitron text-4xl font-extrabold text-white mb-1" id="resultValue">—</p>
          <p class="text-blue-300 text-sm tracking-wide">metric tons</p>
          <div class="mt-4 pt-4 border-t border-blue-900 border-opacity-50 grid grid-cols-2 gap-3 text-xs text-left">
            <div>
              <span class="text-blue-500 uppercase tracking-widest block mb-0.5">Distance</span>
              <span class="text-white font-medium" id="summaryDist">—</span>
            </div>
            <div>
              <span class="text-blue-500 uppercase tracking-widest block mb-0.5">Engine</span>
              <span class="text-white font-medium" id="summaryEngine">—</span>
            </div>
            <div>
              <span class="text-blue-500 uppercase tracking-widest block mb-0.5">Consumption Rate</span>
              <span class="text-white font-medium" id="summaryRate">—</span>
            </div>
            <div>
              <span class="text-blue-500 uppercase tracking-widest block mb-0.5">Formula</span>
              <span class="text-white font-medium" id="summaryFormula">—</span>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /card -->

    <!-- Footer -->
    <p class="text-center mt-6 text-blue-900 text-xs tracking-widest orbitron uppercase">
      AstroFuel &mdash; Mission Control Edition
    </p>
  </div>

  <script>
    const ENGINE_NAMES = {
      '1.2': 'Quantum Drive',
      '3.5': 'Fusion Reactor'
    };

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
      // Shake the input
      const inp = document.getElementById('distance');
      inp.classList.remove('shake');
      void inp.offsetWidth; // reflow
      inp.classList.add('shake');
      inp.addEventListener('animationend', () => inp.classList.remove('shake'), { once: true });
      document.getElementById('result').classList.add('hidden');
    }

    function calculate() {
      const distRaw = document.getElementById('distance').value.trim();
      const rate    = parseFloat(document.getElementById('engine').value);
      const btn     = document.getElementById('calcBtn');

      // Hide previous error & result
      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');

      // Validation
      if (distRaw === '') { showError('Please enter a distance in light years.'); return; }
      const dist = parseFloat(distRaw);
      if (isNaN(dist))        { showError('Please enter a valid numeric distance.'); return; }
      if (dist <= 0)          { showError('Distance must be greater than zero.'); return; }
      if (!isFinite(dist))    { showError('Distance value is out of range.'); return; }

      // Animate button
      btn.disabled = true;
      btn.textContent = '⏳ Computing…';
      setTimeout(() => {
        const total = dist * rate;

        // Format with appropriate decimals (max 4 decimal places, trim trailing zeros)
        const formatted = parseFloat(total.toFixed(4)).toLocaleString('en-US', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 4
        });

        document.getElementById('resultValue').textContent   = formatted;
        document.getElementById('summaryDist').textContent   = `${(+distRaw).toLocaleString()} LY`;
        document.getElementById('summaryEngine').textContent = ENGINE_NAMES[String(rate)];
        document.getElementById('summaryRate').textContent   = `${rate} tons/LY`;
        document.getElementById('summaryFormula').textContent= `${(+distRaw)} × ${rate}`;

        const panel = document.getElementById('result');
        panel.classList.remove('hidden');
        // Trigger re-animation
        panel.classList.remove('result-panel');
        void panel.offsetWidth;
        panel.classList.add('result-panel');

        btn.disabled = false;
        btn.textContent = '🚀 Calculate Fuel';
      }, 480); // slight delay for UX feedback
    }

    // Allow Enter key to trigger calculation
    document.getElementById('distance').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') calculate();
    });
  </script>
</body>
</html>
